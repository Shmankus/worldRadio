  <script>
    // 4. Initialize Map (Centered globally or at default coordinates)
    // Format: [Latitude, Longitude], Zoom Level
    const defaultLocation = [40.7128, -74.0060]; // New York City default
    const map = L.map('map').setView(defaultLocation, 13);

    // 5. Load Map Tiles from OpenStreetMap (Free alternative to Google Maps)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 6. Create a Draggable Marker at the default location
    let marker = L.marker(defaultLocation, {
      draggable: true
    }).addTo(map);

    // Grab form input elements
    const latInput = document.getElementById('latitude');
    const lngInput = document.getElementById('longitude');

    // 7. Function to update input fields
    function updateInputs(lat, lng) {
      // .toFixed(6) limits decimal places for clean storage
      latInput.value = lat.toFixed(6);
      lngInput.value = (((lng + 180) % 360 + 360) % 360 - 180).toFixed(6);
    }

    // Populate inputs initially with default coordinates
    updateInputs(defaultLocation[0], defaultLocation[1]);

    // 8. Event Listener: Map Click (Move marker and update fields)
    map.on('click', function(e) {
      const lat = e.latlng.lat;
      const lng = e.latlng.lng;
      
      marker.setLatLng(e.latlng); // Move marker to clicked spot
      updateInputs(lat, lng);
    });

    // 9. Event Listener: Marker Drag (Update fields after drag finishes)
    marker.on('dragend', function(e) {
      const position = marker.getLatLng();
      updateInputs(position.lat, position.lng);
    });

    // Handle Form Submission
    document.getElementById('locationForm').addEventListener('submit', async (e) => {
      	e.preventDefault();
      
	
            
            try {
                const response = await fetch(`http://192.168.86.29:8000/get_radio_stations`, {

                    body: JSON.stringify({ 'lat':latInput.value , 'lon':lngInput.value })
                });
                const data = await response.json();
                console.log(data.status, data.stations_json);

		

                    const container = document.getElementById('selectedStation');
                    if (data.stations_json && data.stations_json.length > 0) {
                        container.innerHTML = data.stations_json
                            .map(station => `<option value="${station.url}">${station.title}</option>`)
                            .join('');
                    } else {
                        container.innerHTML = '<p class="text-slate-400">No images uploaded yet</p>';
                    }


            } catch (error) {
		    console.log(JSON.stringify(error.message));
            }

	
	
    });

    <script>
	const services = ["dashboard"];

        const listContainer = document.getElementById("services");

        const API_BASE = "http://192.168.86.29:8000";

        function showStatus(elementId, message, isError = false) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            if (isError) {
                el.classList.add('bg-red-900', 'text-red-200');
                el.classList.remove('bg-green-900', 'text-green-200');
            } else {
                el.classList.add('bg-green-900', 'text-green-200');
                el.classList.remove('bg-red-900', 'text-red-200');
            }
        }

        function fetchImages() {
            fetch(`${API_BASE}/getImages`)
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('selectedFile');
                    if (data.files && data.files.length > 0) {
                        container.innerHTML = data.files
                            .map(file => `<option value="${file}">${file}</option>`)
                            .join('');
                    } else {
                        container.innerHTML = '<p class="text-slate-400">No images uploaded yet</p>';
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        // Upload Image
        document.getElementById('imageForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            fetch(`${API_BASE}/upload`, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    showStatus('imageResult', data.status);
                    fetchImages();
                    this.reset();
                })
                .catch(error => showStatus('imageResult', `Error: ${error.message}`, true));
        });
