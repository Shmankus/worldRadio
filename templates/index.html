<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="generator" content="HTML Tidy for HTML5 for Linux version 5.8.0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script><!-- <script type="module" src="serviceCard.js"></script> -->
  <!-- Leaflet.js CSS for Map Styling -->
  <link rel="stylesheet" href="https://unpkg.com">
  <title>Image Dashboard</title>
  <style>
  body {
        font-family: Arial, sans-serif;
        margin: 20px;
  }
    .form-container {
            max-width: 100%;
            margin-bottom: 20px;
    }
    .input-group {
            margin-bottom: 15px;
    }
    label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
    }
    input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
    }
    /* 2. Critical: The map container MUST have a defined height */
    #map {
            height: 400px;
            width: 100%;
            max-width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
    }
    button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
    }
    button:hover {
            background-color: #0056b3;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen py-8">
  <div class="max-w-4xl mx-auto px-4">
    <!-- Radio Section -->
    <div class="bg-slate-800 rounded-lg shadow-lg p-6 mb-6">
      <h2 class="text-xl font-semibold text-white mb-4 flex items-center gap-2">Radio</h2>
      <form id="locationForm" class="form-container" name="locationForm">
        <div class="input-group hidden">
          <label  for="latitude">Latitude</label> <input type="text" id="latitude" name="latitude" readonly placeholder="Click map to select">
        </div>
        <div class="input-group hidden">
          <label for="longitude">Longitude</label> <input type="text" id="longitude" name="longitude" readonly placeholder="Click map to select">
        </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition" type="submit">Search Stations</button>
     
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition" type="button" id="searchRandom">Random</button>
     </form>
      <div class = 'bg-black' id="map"></div>
      <form id="stationSelectForm" class="space-y-4" name="stationSelectForm">
        <div>
          <label for="stationName" class="block text-slate-300 font-medium mb-2">Select Station</label>
          <div id="selectableStations">
            <select id="selectedStation" name="stations">
            </select>
          </div>
        </div>
        <div class="flex gap-3">
          <button type="submit" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded transition">Play Station</button> 
          <button type="button" id="stopStation" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded transition">Stop</button>
        
          <button type="button" id="saveStation" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition">Save</button>

          <button type="button" id="removeStation" class="flex-1 bg-orange-600 hover:bg-orange-700 text-white font-semibold py-2 px-4 rounded transition">Remove</button>
        </div>
      </form>
    </div>
  </div><!-- Radio and Map logic -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 


<script>
    /* Map and button logic */



    // Format: [Latitude, Longitude], Zoom Level
    const defaultLocation = [40.7128, -74.0060]; // New York City default
    const map = L.map('map').setView(defaultLocation, 13);

    // 5. Load Map Tiles from OpenStreetMap (Free alternative to Google Maps)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 20,
    minZoom: 1
}).addTo(map);
    // 6. Create a Draggable Marker at the default location
    let marker = L.marker(defaultLocation, {
        draggable: true
    }).addTo(map);

    // Grab form input elements
    const latInput = document.getElementById('latitude');
    const lngInput = document.getElementById('longitude');

    // 7. Function to update input fields
    function updateInputs(lat, lng) {
    // .toFixed(6) limits decimal places for clean storage
        latInput.value = lat.toFixed(6);
        lngInput.value = (((lng + 180) % 360 + 360) % 360 - 180).toFixed(6);
    }

    // Populate inputs initially with default coordinates
    updateInputs(defaultLocation[0], defaultLocation[1]);

    // 8. Event Listener: Map Click (Move marker and update fields)
    map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        marker.setLatLng(e.latlng); // Move marker to clicked spot
        updateInputs(lat, lng);
    });

    // 9. Event Listener: Marker Drag (Update fields after drag finishes)
    marker.on('dragend', function(e) {
        const position = marker.getLatLng();
        updateInputs(position.lat, position.lng);
    });

    // Handle Form Submission
    document.getElementById('locationForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        try {
            const response = await fetch(`http://192.168.86.29:8000/get_radio_stations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 'lat':latInput.value , 'lon':lngInput.value })
            });
            const data = await response.json();
            console.log(data.status, data.stations_json);

            const container = document.getElementById('selectedStation');
            if (data.stations_json && data.stations_json.length > 0) {
                container.innerHTML = data.stations_json
                    .map(station => `<option value="${station.url}" title="${station.title}"data-country="${station.country}
                        "data-utcoffset="${station.utcOffset}">${station.title}</option>`).join('');
            } else {
                container.innerHTML = '<p class="text-slate-400">No images uploaded yet</p>';
            }


        } catch (error) {
            console.log(JSON.stringify(error.message));
        }

    });



    // random station finder
    
    /**
        Finds a random station and returns it
        
        Type : onClick 
         
        Method : POST
    
        Sends title, country, url and time_offset to Flask
    */
    document.getElementById('searchRandom').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
            const response = await fetch(`http://192.168.86.29:8000/search_random`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                })
            const data = await response.json();
            console.log("randomSearch",data.status)
            console.log("randomSearch", data.debug)
            console.log(data.stations_geo);
            refreshStations(data.new_stations);
            
            // update map 
            updateInputs(data.stations_geo[1], data.stations_geo[0]); 
            marker.setLatLng([data.stations_geo[1], data.stations_geo[0]]);
            map.setView([data.stations_geo[1], data.stations_geo[0]], map.zoom);
        } catch (error) {
                console.error('Error:', error);
                            }
       });


/* Bottom row buttons */

    /**
        Repopulates the selection field with updated stations 
    */
    async function refreshStations(new_stations){
        try {
            const data = new_stations 

            const container = document.getElementById('selectedStation');
       
            container.innerHTML = data
                .map(station => `<option value="${station.url}" title="${station.title}"data-country="${station.country}
                    "data-utcoffset="${station.utcOffset}">${station.title}</option>`).join('');

        } catch (error) {
            console.log(JSON.stringify(error.message));
        }

    }



    /**
        Sends the selected station to be played by the server
        
        Type : submit 
         
        Method : POST
    
        Sends title, country, url and time_offset to Flask
    */
    document.getElementById('stationSelectForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            console.log(selectedStation.value)
            const selectedOption = selectedStation.options[selectedStation.selectedIndex];
            const response = await fetch(`http://192.168.86.29:8000/play_station`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    'title': selectedOption.text,
                    'country' : selectedOption.dataset.country,
                    'url': selectedStation.value,
                    'time_offset' : selectedOption.dataset.utcoffset
                })
            });
        } catch (error) {
            console.error('Error:', error);
        }
    });


    /**
        Sends signal to stop playback on server
        
        Type : onClick 
         
        Method : POST
    
    */
    document.getElementById('stopStation').addEventListener('click', async () => {
        try {
            const response = await fetch(`http://192.168.86.29:8000/stop_station`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            console.log(data.status);
            } catch (error) {
                console.error('Error:', error);
                            }
       });


    /**
        Saves the selected station to saved json
        
        Type : onClick 
         
        Method : POST
    
        Sends title, country, url and time_offset to Flask
    */
    document.getElementById('saveStation').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
            const selectedStation = document.getElementById('selectedStation');
            const selectedOption = selectedStation.options[selectedStation.selectedIndex];
            const response = await fetch(`http://192.168.86.29:8000/add_to_saved`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    'title': selectedOption.text,
                    'country' : selectedOption.dataset.country,
                    'url': selectedStation.value,          
                    'time_offset' : selectedOption.dataset.utcoffset
                })
            });
            const data = await response.json();
            console.log(data.status);
            refreshStations(data.new_stations);
            } catch (error) {
                console.error('Error:', error);
                            }
       });


    /**
        Removes the selected station from saved json
        
        Type : onClick 
         
        Method : POST
    
        Sends title, country, url and time_offset to Flask
    */
    document.getElementById('removeStation').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
            const selectedStation = document.getElementById('selectedStation');
            const selectedOption = selectedStation.options[selectedStation.selectedIndex];
            const response = await fetch(`http://192.168.86.29:8000/remove_from_saved`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    'title': selectedOption.text,
                    'country' : selectedOption.dataset.country,
                    'url': selectedStation.value,          
                    'time_offset' : selectedOption.dataset.utcoffset
                })
            });
            const data = await response.json();
            
            refreshStations(data.new_stations);

            } catch (error) {
                console.error('Error:', error);
                            }
       });
   


    // initial startup saved stations pull
    async function startupFetch(){   
        const response = await fetch(`http://192.168.86.29:8000/read_saved_stations`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
        });
        const data = await response.json();
        refreshStations(data)    
    }

    startupFetch();

 
</script>
</body>
</html>
