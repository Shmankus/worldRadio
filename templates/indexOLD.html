
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<div class="bg-[#222222] flex flex-col justify-center items-center h-screen">
<form id="imageForm" method="post" enctype="multipart/form-data">
  <label for="imageUpload">Choose an image to upload:</label>
  <input
    type="file"
    id="imageUpload"
    name="my_file"
    accept="image/png, image/jpeg, image/webp, image/gif"
  >
  <button type="submit">Upload Image</button>
</form>
<div id="imageResult"></div>

<div class="" >Current Files</div>
<div id="savedImages"></div>

<div>
  <form id="imageNameForm">
    <label for="imgName">Enter image Name:</label>
    <input type="text" id="imgName" name="imgName" placeholder="Type here..." required>
    <button type="submit">Submit Data</button>
  </form>
  <p id="imageNameStatus"></p>
</div>

<button class="bg-white-500" id="killBtn">Kill Display</button>
<div>-----------------------------------------------------------------</div>

<div>
<p>Service Status</p>
<p id="serviceStatus"></p>


</div>
<div>



  <form id="serviceStatusForm">
    <label for="serviceStatusForm">(Check Service) Enter service Name:</label>
    <input type="text" id="serviceStatusName" name="serviceStatusName" placeholder="Type here..." required>
    <button class="bg-white" type="submit">Submit Data</button>
  </form>



</div>



<div>-----------------------------------------------------------------</div>
<div>
  <form id="serviceStopForm">
    <label for="serviceStopForm">(Stop Service) Enter service Name:</label>
    <input type="text" id="serviceStopName" name="serviceStopName" placeholder="Type here..." required>
    <button class="bg-white" type="submit">Submit Data</button>
  </form>
</div>




<div>-----------------------------------------------------------------</div>
<div>
  <form id="serviceStartForm">
    <label for="serviceStartForm">(Start Service) Enter service Name:</label>
    <input type="text" id="serviceStartName" name="serviceStartName" placeholder="Type here..." required>
    <button class="bg-white" type="submit">Submit Data</button>
  </form>
</div>

</div>


<script>
function fetchImages(){
    fetch("http://192.168.86.33:8000/getImages", {
        method: 'GET'
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('savedImages').innerText = data.files
    })
    .catch(error => console.error('Error:', error));
}

document.getElementById('imageForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    fetch("http://192.168.86.33:8000/upload", {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('imageResult').innerText = data.status;
        fetchImages();
    })
    .catch(error => console.error('Error:', error));
});


// getService Status
document.getElementById('serviceStatusForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const serviceName = document.getElementById('serviceStatusName').value;
    
    
    try {
        const response = await fetch("http://192.168.86.33:8000/checkService", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"serviceName": serviceName})
        });
        const data = await response.json();
        document.getElementById('serviceStatus').innerText = `Running? : ${data.isRunning}`;
    } catch (error) {
        document.getElementById('serviceStatus').innerText = `Error: ${error.message}`;
    }
});


// Stop service
document.getElementById('serviceStopForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const serviceName = document.getElementById('serviceStopName').value;
    
    
    try {
        const response = await fetch("http://192.168.86.33:8000/stopService", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"serviceName": serviceName})
        });
        const data = await response.json();
        document.getElementById('serviceStatus').innerText = `Running? : ${data.isRunning}`;
    } catch (error) {
        document.getElementById('serviceStatus').innerText = `Error: ${error.message}`;
    }
});



// Start service
document.getElementById('serviceStartForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const serviceName = document.getElementById('serviceStartName').value;
    
    
    try {
        const response = await fetch("http://192.168.86.33:8000/startService", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"serviceName": serviceName})
        });
        const data = await response.json();
        document.getElementById('serviceStatus').innerText = `Running? : ${data.isRunning}`;
    } catch (error) {
        document.getElementById('serviceStatus').innerText = `Error: ${error.message}`;
    }
});



document.getElementById('imageNameForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const imageName = document.getElementById('imgName').value;
    const imagePath = `/home/shmank/flaskServer/uploads/${imageName}`;
    
    try {
        const response = await fetch("http://192.168.86.33:8000/displayImage", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({imagePath: imagePath})
        });
        const data = await response.json();
        document.getElementById('serviceStatus').innerText = `Success: ${data.status}`;
    } catch (error) {
        document.getElementById('serviceStatus').innerText = `Error: ${error.message}`;
    }
});

document.getElementById('killBtn').addEventListener('click', async () => {
    const response = await fetch("http://192.168.86.33:8000/killDisplay", {
        method: 'POST',
        headers: {'Content-Type': 'application/json'}
    });
    const data = await response.json();
    console.log(data.status);
});

fetchImages();
</script>
